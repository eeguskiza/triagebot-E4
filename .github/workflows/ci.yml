name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ matrix.python-version }}-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint
        run: ruff check .

      - name: Tests + coverage
        run: pytest -v --cov=app --cov-report=html --cov-report=json:htmlcov/coverage.json --junit-xml=htmlcov/junit.xml --benchmark-disable

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-py${{ matrix.python-version }}
          path: htmlcov/
          retention-days: 7

  pages:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Download coverage 3.11
        uses: actions/download-artifact@v4
        with:
          name: coverage-py3.11
          path: site/py311

      - name: Download coverage 3.12
        uses: actions/download-artifact@v4
        with:
          name: coverage-py3.12
          path: site/py312

      - name: Build index page
        run: |
          python3 - <<'PYEOF'
          import json, math, pathlib, xml.etree.ElementTree as ET
          from datetime import datetime, timezone

          THRESHOLD = 65
          CIRC = round(2 * math.pi * 52, 2)
          VERSIONS = ["3.11", "3.12"]

          def load_cov(path):
              with open(path) as f: return json.load(f)

          def load_junit(path):
              root  = ET.parse(path).getroot()
              suite = root if root.tag == "testsuite" else root.find("testsuite")
              tests    = int(suite.get("tests",    0))
              failures = int(suite.get("failures", 0))
              errors   = int(suite.get("errors",   0))
              skipped  = int(suite.get("skipped",  0))
              cases = []
              for tc in suite.findall(".//testcase"):
                  st = ("fail" if (tc.find("failure") is not None or tc.find("error") is not None)
                        else "skip" if tc.find("skipped") is not None else "pass")
                  cases.append({"name": tc.get("name"), "classname": tc.get("classname",""), "status": st})
              return {"tests": tests, "passed": tests-failures-errors-skipped,
                      "failures": failures, "errors": errors, "skipped": skipped, "cases": cases}

          def col(p):
              return "#1b5e20" if p>=80 else "#2e7d32" if p>=THRESHOLD else "#e65100" if p>=50 else "#b71c1c"

          def donut(p, c):
              f = round((p/100)*CIRC,1); g = round(CIRC-f,1)
              lbl = "PASS" if p>=THRESHOLD else "FAIL"
              lc  = "#2e7d32" if p>=THRESHOLD else "#b71c1c"
              return (f'<svg viewBox="0 0 120 120" width="130" height="130">'
                      f'<circle cx="60" cy="60" r="52" fill="none" stroke="#e8ecf0" stroke-width="13"/>'
                      f'<circle cx="60" cy="60" r="52" fill="none" stroke="{c}" stroke-width="13"'
                      f' stroke-dasharray="{f} {g}" stroke-linecap="round" transform="rotate(-90 60 60)"/>'
                      f'<text x="60" y="52" text-anchor="middle" font-size="20" font-weight="700" fill="{c}" font-family="system-ui">{p}%</text>'
                      f'<text x="60" y="70" text-anchor="middle" font-size="10" font-weight="700" fill="{lc}" font-family="system-ui" letter-spacing="1">{lbl}</text>'
                      f'</svg>')

          def bar(p, c):
              return (f'<div style="display:flex;align-items:center;gap:8px">'
                      f'<div style="flex:1;background:#e8ecf0;border-radius:6px;height:8px">'
                      f'<div style="width:{p:.0f}%;background:{c};height:8px;border-radius:6px"></div></div>'
                      f'<span style="font-size:.8rem;font-weight:700;color:{c};min-width:34px;text-align:right">{p:.0f}%</span></div>')

          cov   = {v: load_cov(  f"site/py{v.replace('.','')}/coverage.json") for v in VERSIONS}
          junit = {v: load_junit(f"site/py{v.replace('.','')}/junit.xml")     for v in VERSIONS}
          totals = {v: round(cov[v]["totals"]["percent_covered"],1) for v in VERSIONS}

          # ── summary cards ──────────────────────────────────────────────────
          cards = ""
          for v in VERSIONS:
              p = totals[v]; c = col(p); slug = v.replace(".","")
              j = junit[v];  t = cov[v]["totals"]
              ok      = j["failures"]==0 and j["errors"]==0
              sbg     = "#e8f5e9" if ok else "#ffebee"
              sc      = "#2e7d32" if ok else "#b71c1c"
              stxt    = f'✅&nbsp;{j["passed"]}/{j["tests"]} tests OK' if ok else f'❌&nbsp;{j["failures"]} fallando'
              cards += (f'<div class="card" style="border-top:5px solid {c}">'
                        f'<div class="cv">Python {v}</div>'
                        f'<div class="donut">{donut(p,c)}</div>'
                        f'<div class="pill" style="background:{sbg};color:{sc}">{stxt}</div>'
                        f'<div class="stats">'
                        f'<div class="st"><b style="color:{c}">{t["covered_lines"]}</b><small>cubiertas</small></div>'
                        f'<div class="st"><b style="color:#c62828">{t["missing_lines"]}</b><small>sin cubrir</small></div>'
                        f'<div class="st"><b style="color:#555">{t["num_statements"]}</b><small>total</small></div>'
                        f'</div>'
                        f'<a class="btn" href="py{slug}/index.html" style="background:{c}">Informe completo →</a>'
                        f'</div>')

          # ── test results table ─────────────────────────────────────────────
          all_cases = {}
          for v in VERSIONS:
              for tc in junit[v]["cases"]:
                  all_cases.setdefault(tc["name"], tc["classname"])

          def icon(name, v):
              for tc in junit[v]["cases"]:
                  if tc["name"]==name:
                      return {"pass":"✅","fail":"❌","skip":"⏭️"}[tc["status"]]
              return "—"

          def readable(n):
              return n.replace("test_","").replace("_"," ").capitalize()

          grouped = {}
          for name, cls in all_cases.items():
              mod = cls.split(".")[-1].replace("test_","") if cls else "otros"
              grouped.setdefault(mod, []).append(name)

          test_rows = ""
          for mod in sorted(grouped):
              first = True
              for name in sorted(grouped[mod]):
                  cells = "".join(f'<td class="ic">{icon(name,v)}</td>' for v in VERSIONS)
                  tag   = f'<span class="mod">{mod}</span>' if first else '<span class="mod" style="opacity:0">{mod}</span>'
                  test_rows += f'<tr><td class="tn">{tag}{readable(name)}</td>{cells}</tr>'
                  first = False

          # ── module coverage ────────────────────────────────────────────────
          all_files = sorted(set(cov["3.11"]["files"]) | set(cov["3.12"]["files"]))
          mod_rows = ""
          for f in all_files:
              name = f.replace("app/","")
              row  = f'<td><code>{name}</code></td>'
              for v in VERSIONS:
                  if f in cov[v]["files"]:
                      p = round(cov[v]["files"][f]["summary"]["percent_covered"])
                      row += f"<td>{bar(p,col(p))}</td>"
                  else:
                      row += "<td style='color:#ccc'>—</td>"
              mod_rows += f"<tr>{row}</tr>"

          ver_ths = "".join(f"<th>Python {v}</th>" for v in VERSIONS)
          now = datetime.now(timezone.utc).strftime("%d/%m/%Y %H:%M UTC")

          html = f"""<!DOCTYPE html>
          <html lang="es">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width,initial-scale=1">
            <title>TriageBot · CI Dashboard</title>
            <style>
              *{{box-sizing:border-box;margin:0;padding:0}}
              body{{font-family:system-ui,sans-serif;background:#f0f4f8;color:#1a1a2e;min-height:100vh}}
              header{{background:linear-gradient(135deg,#0d1b2a 0%,#1b2a3b 60%,#1565c0 100%);
                      color:#fff;padding:36px 24px 30px;text-align:center}}
              header h1{{font-size:1.9rem;font-weight:800;letter-spacing:-.02em}}
              header p{{margin-top:8px;opacity:.65;font-size:.85rem}}
              main{{max-width:920px;margin:0 auto;padding:32px 20px 48px}}
              h2{{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;
                  color:#94a3b8;margin-bottom:14px;margin-top:32px}}
              .cards{{display:grid;grid-template-columns:1fr 1fr;gap:20px}}
              .card{{background:#fff;border-radius:14px;padding:24px 20px 22px;text-align:center;
                     box-shadow:0 2px 12px #00000012}}
              .cv{{font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#94a3b8;margin-bottom:6px}}
              .donut{{display:flex;justify-content:center;margin:2px 0 10px}}
              .pill{{display:inline-block;padding:5px 14px;border-radius:20px;font-size:.82rem;
                     font-weight:700;margin-bottom:14px}}
              .stats{{display:flex;justify-content:center;gap:24px;margin-bottom:18px}}
              .st{{display:flex;flex-direction:column;align-items:center;gap:2px}}
              .st b{{font-size:1.3rem;font-weight:800}}
              .st small{{font-size:.68rem;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em}}
              .btn{{display:inline-block;padding:9px 20px;border-radius:8px;color:#fff;
                    font-weight:700;font-size:.84rem;text-decoration:none}}
              .btn:hover{{filter:brightness(1.1)}}
              table{{width:100%;background:#fff;border-radius:12px;border-collapse:collapse;
                     box-shadow:0 2px 12px #00000012;overflow:hidden}}
              th{{background:#f8fafc;font-size:.72rem;font-weight:700;text-transform:uppercase;
                  letter-spacing:.07em;color:#94a3b8;padding:11px 16px;border-bottom:1px solid #e2e8f0}}
              td{{padding:10px 16px;border-bottom:1px solid #f1f5f9;font-size:.88rem}}
              tr:last-child td{{border-bottom:none}}
              tr:hover td{{background:#fafcff}}
              .tn{{color:#334155;max-width:420px}}
              .ic{{text-align:center;font-size:1rem;width:80px}}
              .mod{{display:inline-block;font-size:.68rem;font-weight:700;text-transform:uppercase;
                    letter-spacing:.07em;color:#94a3b8;background:#f1f5f9;border-radius:4px;
                    padding:1px 6px;margin-right:8px;min-width:80px;text-align:center}}
              code{{font-family:ui-monospace,monospace;font-size:.85rem;color:#1565c0}}
              footer{{text-align:center;padding:24px 0;font-size:.78rem;color:#cbd5e1}}
              @media(max-width:580px){{.cards{{grid-template-columns:1fr}}}}
            </style>
          </head>
          <body>
            <header>
              <h1>🤖 TriageBot · CI Dashboard</h1>
              <p>Actualizado el {now} &nbsp;·&nbsp; Umbral de cobertura: {THRESHOLD}% &nbsp;·&nbsp; <code style="opacity:.75">app/seed.py</code> excluido</p>
            </header>
            <main>
              <h2>Cobertura por versión</h2>
              <div class="cards">{cards}</div>

              <h2>Resultados de tests ({len(all_cases)} en total)</h2>
              <table>
                <thead><tr><th>Test</th>{ver_ths}</tr></thead>
                <tbody>{test_rows}</tbody>
              </table>

              <h2>Cobertura por módulo</h2>
              <table>
                <thead><tr><th>Módulo</th>{ver_ths}</tr></thead>
                <tbody>{mod_rows}</tbody>
              </table>
            </main>
            <footer>Generado automáticamente en cada push a <code>main</code></footer>
          </body>
          </html>"""

          pathlib.Path("site/index.html").write_text(html)
          print("Dashboard built — " + " / ".join(f"py{v}: {totals[v]}% ({junit[v]['passed']}/{junit[v]['tests']})" for v in VERSIONS))
          PYEOF

      - name: Upload Pages artifact
        id: upload-pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
        with:
          artifact_id: ${{ steps.upload-pages.outputs.artifact-id }}
