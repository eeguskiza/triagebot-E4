name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ matrix.python-version }}-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint
        run: ruff check .

      - name: Tests + coverage
        run: pytest -v --cov=app --cov-report=html --cov-report=json:htmlcov/coverage.json

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-py${{ matrix.python-version }}
          path: htmlcov/
          retention-days: 7

  pages:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Download coverage 3.11
        uses: actions/download-artifact@v4
        with:
          name: coverage-py3.11
          path: site/py311

      - name: Download coverage 3.12
        uses: actions/download-artifact@v4
        with:
          name: coverage-py3.12
          path: site/py312

      - name: Build index page
        run: |
          python3 - <<'PYEOF'
          import json, math, pathlib
          from datetime import datetime, timezone

          THRESHOLD = 65
          CIRC = round(2 * math.pi * 52, 2)

          def load(path):
              with open(path) as f:
                  return json.load(f)

          def color(p):
              if p >= 80: return "#1b5e20"
              if p >= THRESHOLD: return "#2e7d32"
              if p >= 50: return "#e65100"
              return "#b71c1c"

          def donut(p, col):
              filled = round((p / 100) * CIRC, 1)
              gap    = round(CIRC - filled, 1)
              label  = "PASS" if p >= THRESHOLD else "FAIL"
              lcolor = "#2e7d32" if p >= THRESHOLD else "#b71c1c"
              return (
                  f'<svg viewBox="0 0 120 120" width="150" height="150">'
                  f'<circle cx="60" cy="60" r="52" fill="none" stroke="#e8ecf0" stroke-width="13"/>'
                  f'<circle cx="60" cy="60" r="52" fill="none" stroke="{col}" stroke-width="13"'
                  f' stroke-dasharray="{filled} {gap}" stroke-linecap="round"'
                  f' transform="rotate(-90 60 60)"/>'
                  f'<text x="60" y="53" text-anchor="middle" font-size="22"'
                  f' font-weight="700" fill="{col}" font-family="system-ui">{p}%</text>'
                  f'<text x="60" y="74" text-anchor="middle" font-size="11"'
                  f' font-weight="700" fill="{lcolor}" font-family="system-ui"'
                  f' letter-spacing="1">{label}</text>'
                  f'</svg>'
              )

          def bar(p, col):
              return (
                  f'<div style="display:flex;align-items:center;gap:8px">'
                  f'<div style="flex:1;background:#e8ecf0;border-radius:6px;height:10px">'
                  f'<div style="width:{p:.0f}%;background:{col};height:10px;border-radius:6px"></div>'
                  f'</div>'
                  f'<span style="font-size:.82rem;font-weight:700;color:{col};min-width:38px;text-align:right">{p:.0f}%</span>'
                  f'</div>'
              )

          data = {
              "3.11": load("site/py311/coverage.json"),
              "3.12": load("site/py312/coverage.json"),
          }
          totals = {v: round(d["totals"]["percent_covered"], 1) for v, d in data.items()}

          cards = ""
          for v, p in totals.items():
              col  = color(p)
              slug = v.replace(".", "")
              t    = data[v]["totals"]
              cards += (
                  f'<div class="card" style="border-top:5px solid {col}">'
                  f'<div class="card-title">Python {v}</div>'
                  f'<div class="donut">{donut(p, col)}</div>'
                  f'<div class="stats">'
                  f'<div class="stat"><span style="color:{col}">{t["covered_lines"]}</span><small>cubiertas</small></div>'
                  f'<div class="stat"><span style="color:#b71c1c">{t["missing_lines"]}</span><small>sin cubrir</small></div>'
                  f'<div class="stat"><span style="color:#555">{t["num_statements"]}</span><small>total</small></div>'
                  f'</div>'
                  f'<a class="btn" href="py{slug}/index.html" style="background:{col}">Ver informe completo →</a>'
                  f'</div>'
              )

          all_files = sorted(set(data["3.11"]["files"]) | set(data["3.12"]["files"]))
          rows = ""
          for f in all_files:
              name = f.replace("app/", "")
              row  = f'<td><code>{name}</code></td>'
              for v in ["3.11", "3.12"]:
                  if f in data[v]["files"]:
                      p = round(data[v]["files"][f]["summary"]["percent_covered"])
                      row += f"<td>{bar(p, color(p))}</td>"
                  else:
                      row += "<td style='color:#bbb'>—</td>"
              rows += f"<tr>{row}</tr>"

          now = datetime.now(timezone.utc).strftime("%d/%m/%Y %H:%M UTC")

          html = f"""<!DOCTYPE html>
          <html lang="es">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width,initial-scale=1">
            <title>TriageBot · Cobertura</title>
            <style>
              *{{box-sizing:border-box;margin:0;padding:0}}
              body{{font-family:system-ui,sans-serif;background:#f0f4f8;color:#1a1a2e;min-height:100vh}}
              header{{background:linear-gradient(135deg,#0d1b2a 0%,#1b2a3b 60%,#1565c0 100%);
                      color:#fff;padding:36px 24px 32px;text-align:center}}
              header h1{{font-size:2rem;font-weight:800;letter-spacing:-.03em}}
              header p{{margin-top:8px;opacity:.7;font-size:.88rem}}
              main{{max-width:880px;margin:0 auto;padding:36px 20px}}
              .cards{{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:36px}}
              .card{{background:#fff;border-radius:14px;padding:28px 20px 24px;
                     text-align:center;box-shadow:0 4px 16px #0000001a}}
              .card-title{{font-size:.85rem;font-weight:700;text-transform:uppercase;
                           letter-spacing:.1em;color:#888;margin-bottom:8px}}
              .donut{{display:flex;justify-content:center;margin:4px 0 12px}}
              .stats{{display:flex;justify-content:center;gap:28px;margin:12px 0 20px}}
              .stat{{display:flex;flex-direction:column;align-items:center;gap:2px}}
              .stat span{{font-size:1.4rem;font-weight:800}}
              .stat small{{font-size:.72rem;color:#aaa;text-transform:uppercase;letter-spacing:.05em}}
              .btn{{display:inline-block;padding:10px 22px;border-radius:8px;color:#fff;
                    font-weight:700;font-size:.88rem;text-decoration:none;
                    transition:filter .15s}}
              .btn:hover{{filter:brightness(1.12)}}
              .section-title{{font-size:.8rem;font-weight:700;text-transform:uppercase;
                              letter-spacing:.1em;color:#888;margin-bottom:14px}}
              table{{width:100%;background:#fff;border-radius:14px;overflow:hidden;
                     box-shadow:0 4px 16px #0000001a;border-collapse:collapse}}
              th,td{{padding:12px 18px;text-align:left}}
              th{{background:#f8fafc;font-size:.75rem;font-weight:700;text-transform:uppercase;
                  letter-spacing:.07em;color:#999;border-bottom:2px solid #f0f4f8}}
              tr:not(:last-child) td{{border-bottom:1px solid #f4f6f9}}
              tr:hover td{{background:#fbfcfd}}
              code{{font-family:ui-monospace,monospace;font-size:.88rem;color:#1565c0}}
              footer{{text-align:center;padding:32px 0 24px;font-size:.8rem;color:#bbb}}
              @media(max-width:560px){{.cards{{grid-template-columns:1fr}}}}
            </style>
          </head>
          <body>
            <header>
              <h1>🤖 TriageBot · Cobertura de tests</h1>
              <p>Actualizado el {now} · Umbral mínimo {THRESHOLD}% · <code style="opacity:.8">app/seed.py</code> excluido</p>
            </header>
            <main>
              <div class="cards">{cards}</div>
              <p class="section-title">Cobertura por módulo</p>
              <table>
                <thead>
                  <tr><th>Módulo</th><th>Python 3.11</th><th>Python 3.12</th></tr>
                </thead>
                <tbody>{rows}</tbody>
              </table>
            </main>
            <footer>Generado automáticamente en cada push a <code>main</code></footer>
          </body>
          </html>"""

          pathlib.Path("site/index.html").write_text(html)
          print("Index built — " + " / ".join(f"py{v}: {p}%" for v, p in totals.items()))
          PYEOF

      - name: Upload Pages artifact
        id: upload-pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
        with:
          artifact_id: ${{ steps.upload-pages.outputs.artifact-id }}
