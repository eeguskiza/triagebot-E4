[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
ignore = []

[tool.ruff.lint.per-file-ignores]
# Los tests no se reformatean por longitud de línea (los aporta el equipo y no se
# modifican por estilo): ignoramos solo E501 en todo tests/. El resto de reglas sigue.
"tests/*.py" = ["E501"]
"lab9/test_*.py" = ["E501"]

[tool.pytest.ini_options]
testpaths = ["tests", "lab9"]
pythonpath = ["."]
addopts = "-ra"

[tool.coverage.run]
omit = ["app/seed.py"]

[tool.coverage.report]
fail_under = 65
