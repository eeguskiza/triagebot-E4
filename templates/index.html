<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TriageBot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    .htmx-indicator { display: none; }
    .htmx-request .htmx-indicator { display: inline; }
  </style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen">

  <!-- Nav — misma estética que el CI Dashboard -->
  <nav class="bg-slate-900 border-b border-slate-800 h-13 flex items-center justify-between px-6 py-3">
    <span class="text-sm font-bold text-white tracking-tight">
      Triage<span class="text-indigo-400">Bot</span>
    </span>
    <span class="text-xs text-slate-400">Tablero de incidencias · clasificación automática por IA</span>
  </nav>

  <main class="mx-auto max-w-6xl px-5 py-8 space-y-6">

    <!-- Formulario -->
    <section class="bg-white border border-gray-200 rounded-xl p-5 shadow-sm">
      <p class="text-xs font-semibold uppercase tracking-widest text-gray-400 mb-4">Nuevo ticket</p>
      <form hx-post="/ui/tickets" hx-target="#tickets-container" hx-swap="innerHTML"
            hx-include="#filters"
            hx-on::after-request="if(event.detail.successful) this.reset()"
            class="grid gap-3 sm:grid-cols-3">
        <input name="title" required maxlength="200" placeholder="Título del ticket"
               class="rounded-lg border border-gray-200 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 sm:col-span-1">
        <textarea name="description" required maxlength="5000" rows="2" placeholder="Descripción detallada…"
                  class="rounded-lg border border-gray-200 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 sm:col-span-2 resize-none"></textarea>
        <div class="sm:col-span-3 flex items-center gap-3">
          <button type="submit"
                  class="rounded-lg bg-slate-900 px-4 py-2 text-sm font-semibold text-white hover:bg-slate-700 transition-colors">
            Crear ticket
          </button>
          <span class="htmx-indicator text-xs text-gray-400">Clasificando…</span>
        </div>
      </form>
    </section>

    <!-- Filtros -->
    <section class="bg-white border border-gray-200 rounded-xl p-5 shadow-sm">
      <p class="text-xs font-semibold uppercase tracking-widest text-gray-400 mb-4">Filtros</p>
      <div id="filters" class="flex flex-wrap gap-3">
        <input name="q" value="{{ filters.q }}" placeholder="Buscar en título o descripción…"
               hx-get="/ui/tickets" hx-target="#tickets-container" hx-swap="innerHTML"
               hx-trigger="input changed delay:300ms, search" hx-include="#filters" hx-push-url="true"
               class="min-w-[16rem] flex-1 rounded-lg border border-gray-200 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
        <select name="category" hx-get="/ui/tickets" hx-target="#tickets-container" hx-swap="innerHTML"
                hx-trigger="change" hx-include="#filters" hx-push-url="true"
                class="rounded-lg border border-gray-200 px-3 py-2 text-sm text-gray-600 focus:outline-none focus:ring-2 focus:ring-indigo-400">
          <option value="">Categoría (todas)</option>
          <option value="bug" {% if filters.category == "bug" %}selected{% endif %}>bug</option>
          <option value="feature_request" {% if filters.category == "feature_request" %}selected{% endif %}>feature_request</option>
          <option value="question" {% if filters.category == "question" %}selected{% endif %}>question</option>
          <option value="urgent" {% if filters.category == "urgent" %}selected{% endif %}>urgent</option>
        </select>
        <select name="priority" hx-get="/ui/tickets" hx-target="#tickets-container" hx-swap="innerHTML"
                hx-trigger="change" hx-include="#filters" hx-push-url="true"
                class="rounded-lg border border-gray-200 px-3 py-2 text-sm text-gray-600 focus:outline-none focus:ring-2 focus:ring-indigo-400">
          <option value="">Prioridad (todas)</option>
          <option value="P1" {% if filters.priority == "P1" %}selected{% endif %}>P1</option>
          <option value="P2" {% if filters.priority == "P2" %}selected{% endif %}>P2</option>
          <option value="P3" {% if filters.priority == "P3" %}selected{% endif %}>P3</option>
        </select>
        <select name="status" hx-get="/ui/tickets" hx-target="#tickets-container" hx-swap="innerHTML"
                hx-trigger="change" hx-include="#filters" hx-push-url="true"
                class="rounded-lg border border-gray-200 px-3 py-2 text-sm text-gray-600 focus:outline-none focus:ring-2 focus:ring-indigo-400">
          <option value="">Estado (todos)</option>
          <option value="open" {% if filters.status == "open" %}selected{% endif %}>open</option>
          <option value="in_progress" {% if filters.status == "in_progress" %}selected{% endif %}>in_progress</option>
          <option value="resolved" {% if filters.status == "resolved" %}selected{% endif %}>resolved</option>
          <option value="closed" {% if filters.status == "closed" %}selected{% endif %}>closed</option>
        </select>
        <input name="assignee" value="{{ filters.assignee }}" placeholder="Responsable…"
               hx-get="/ui/tickets" hx-target="#tickets-container" hx-swap="innerHTML"
               hx-trigger="input changed delay:300ms, search" hx-include="#filters" hx-push-url="true"
               class="rounded-lg border border-gray-200 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
        <label class="flex items-center gap-2 cursor-pointer select-none rounded-lg border border-gray-200 px-3 py-2 text-sm text-gray-600 hover:bg-gray-50">
          <input type="checkbox" name="overdue" value="true"
                 {% if filters.overdue %}checked{% endif %}
                 hx-get="/ui/tickets" hx-target="#tickets-container" hx-swap="innerHTML"
                 hx-trigger="change" hx-include="#filters" hx-push-url="true"
                 class="accent-red-600 w-4 h-4">
          Solo vencidos
        </label>
      </div>
    </section>

    <!-- Tablero -->
    <section id="tickets-container">
      {% include "_tickets_table.html" %}
    </section>

  </main>
</body>
</html>
