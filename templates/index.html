<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TriageBot</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>
<body class="bg-slate-50 text-slate-900">
  <main class="mx-auto max-w-6xl p-6 space-y-6">
    <header>
      <h1 class="text-3xl font-bold">TriageBot</h1>
      <p class="mt-1 text-slate-600">Tablero de incidencias con clasificación automática por IA.</p>
    </header>

    <!-- Formulario de creación -->
    <section class="rounded-lg bg-white p-4 shadow-sm ring-1 ring-slate-200">
      <h2 class="mb-3 text-lg font-semibold">Nuevo ticket</h2>
      <form hx-post="/ui/tickets" hx-target="#tickets-container" hx-swap="innerHTML"
            hx-include="#filters"
            hx-on::after-request="if(event.detail.successful) this.reset()"
            class="grid gap-3 sm:grid-cols-3">
        <input name="title" required maxlength="200" placeholder="Título"
               class="rounded-md border border-slate-300 px-3 py-2 text-sm sm:col-span-1">
        <textarea name="description" required maxlength="5000" rows="2" placeholder="Descripción"
                  class="rounded-md border border-slate-300 px-3 py-2 text-sm sm:col-span-2"></textarea>
        <div class="sm:col-span-3">
          <button type="submit"
                  class="rounded-md bg-slate-900 px-4 py-2 text-sm font-medium text-white hover:bg-slate-700">
            Crear ticket
          </button>
          <span class="htmx-indicator ml-2 text-sm text-slate-500">Clasificando…</span>
        </div>
      </form>
    </section>

    <!-- Filtros + buscador -->
    <section class="rounded-lg bg-white p-4 shadow-sm ring-1 ring-slate-200">
      <h2 class="mb-3 text-lg font-semibold">Filtros</h2>
      <div id="filters" class="flex flex-wrap gap-3">
        <input name="q" value="{{ filters.q }}" placeholder="Buscar en título o descripción…"
               hx-get="/ui/tickets" hx-target="#tickets-container" hx-swap="innerHTML"
               hx-trigger="input changed delay:300ms, search" hx-include="#filters" hx-push-url="true"
               class="min-w-[16rem] flex-1 rounded-md border border-slate-300 px-3 py-2 text-sm">
        <select name="category" hx-get="/ui/tickets" hx-target="#tickets-container" hx-swap="innerHTML"
                hx-trigger="change" hx-include="#filters" hx-push-url="true"
                class="rounded-md border border-slate-300 px-3 py-2 text-sm">
          <option value="">Categoría (todas)</option>
          <option value="bug" {% if filters.category == "bug" %}selected{% endif %}>bug</option>
          <option value="feature_request" {% if filters.category == "feature_request" %}selected{% endif %}>feature_request</option>
          <option value="question" {% if filters.category == "question" %}selected{% endif %}>question</option>
          <option value="urgent" {% if filters.category == "urgent" %}selected{% endif %}>urgent</option>
        </select>
        <select name="priority" hx-get="/ui/tickets" hx-target="#tickets-container" hx-swap="innerHTML"
                hx-trigger="change" hx-include="#filters" hx-push-url="true"
                class="rounded-md border border-slate-300 px-3 py-2 text-sm">
          <option value="">Prioridad (todas)</option>
          <option value="P1" {% if filters.priority == "P1" %}selected{% endif %}>P1</option>
          <option value="P2" {% if filters.priority == "P2" %}selected{% endif %}>P2</option>
          <option value="P3" {% if filters.priority == "P3" %}selected{% endif %}>P3</option>
        </select>
        <select name="status" hx-get="/ui/tickets" hx-target="#tickets-container" hx-swap="innerHTML"
                hx-trigger="change" hx-include="#filters" hx-push-url="true"
                class="rounded-md border border-slate-300 px-3 py-2 text-sm">
          <option value="">Estado (todos)</option>
          <option value="open" {% if filters.status == "open" %}selected{% endif %}>open</option>
          <option value="in_progress" {% if filters.status == "in_progress" %}selected{% endif %}>in_progress</option>
          <option value="closed" {% if filters.status == "closed" %}selected{% endif %}>closed</option>
        </select>
      </div>
    </section>

    <!-- Tablero -->
    <section id="tickets-container">
      {% include "_tickets_table.html" %}
    </section>
  </main>
</body>
</html>
